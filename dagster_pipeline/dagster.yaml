run_storage:
  module: dagster_postgres.run_storage
  class: PostgresRunStorage
  config:
    postgres_db:
      hostname:
        env: POSTGRES_HOST
      db_name:
        env: POSTGRES_DB
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      port: 5432

event_log_storage:
  module: dagster_postgres.event_log
  class: PostgresEventLogStorage
  config:
    postgres_db:
      hostname:
        env: POSTGRES_HOST
      db_name:
        env: POSTGRES_DB
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      port: 5432

schedule_storage:
  module: dagster_postgres.schedule_storage
  class: PostgresScheduleStorage
  config:
    postgres_db:
      hostname:
        env: POSTGRES_HOST
      db_name:
        env: POSTGRES_DB
      username:
        env: POSTGRES_USER
      password:
        env: POSTGRES_PASSWORD
      port: 5432

local_artifact_storage:
  module: dagster._core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /app/diabetes_pipeline/dagster_pipeline/storage
