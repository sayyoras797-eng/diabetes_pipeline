events {}

http {
    # Streamlit dashboard — asosiy (default) server, IP orqali ham ishlaydi
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://streamlit:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Dagster UI — /dagster/ ostida, parol bilan himoyalangan
        location /dagster/ {
            auth_basic "Dagster - cheklangan kirish";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://dagster-webserver:3000/dagster/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # MLflow UI — /mlflow/ ostida, parol bilan himoyalangan
        location /mlflow/ {
            auth_basic "MLflow - cheklangan kirish";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://mlflow:5000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }
}
